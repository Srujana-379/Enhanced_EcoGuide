<!doctype html>
<html>
<head>
    <title>Enhanced EcoGuide AI</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4fbf7; color: #123; margin: 40px; }
        .card { background: white; padding: 24px; border-radius: 16px; max-width: 760px; box-shadow: 0 4px 18px rgba(0,0,0,0.08); }
        input { width: 100%; padding: 10px; margin: 6px 0 14px; }
        button { padding: 12px 18px; background: #1f8f5f; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .score { font-size: 40px; color: #1f8f5f; }
    </style>
</head>
<body>
<div class="card">
    <h1>Enhanced EcoGuide AI</h1>
    <p>Enter your habits to get an EcoScore and sustainability tips.</p>
    <form method="post">
        <label>Energy use (kWh/month)</label>
        <input name="energy_kwh" value="{{ profile.energy_kwh }}" type="number" step="0.1">
        <label>Transport (km/week)</label>
        <input name="transport_km" value="{{ profile.transport_km }}" type="number" step="0.1">
        <label>Waste (kg/week)</label>
        <input name="waste_kg" value="{{ profile.waste_kg }}" type="number" step="0.1">
        <label>Water use (liters/day)</label>
        <input name="water_liters" value="{{ profile.water_liters }}" type="number" step="0.1">
        <label>Recycling actions/week</label>
        <input name="recycling" value="{{ profile.recycling }}" type="number" step="0.1">
        <button type="submit">Generate EcoGuide</button>
    </form>
    <h2>EcoScore</h2>
    <div class="score">{{ score }}/100</div>
    <h2>Recommendations</h2>
    <ul>
        {% for tip in tips %}
        <li>{{ tip }}</li>
        {% endfor %}
    </ul>
    <p><a href="/about">About this project</a></p>
</div>
</body>
</html>
